<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 04 - Mobile Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="04-style.css" />
  </head>
  <body>
    <header class="bg-white p-4 shadow-sm mb-4 d-flex justify-content-between align-items-center sticky-top">
      <h1 class="h5 mb-0 fw-bold">Hoàn Tất Thanh Toán</h1>
      <a href="#" class="text-muted text-decoration-none fw-bold">Quay Lại</a>
    </header>

    <main class="container py-2 checkout-grid">
      <div class="d-flex flex-column gap-4">
        <section>
          <h2 class="h6 text-muted text-uppercase mb-3 border-bottom pb-2">Địa Chỉ Giao Hàng</h2>
          <p class="fw-bold fs-5 mb-1">Khách Hàng</p>
          <p class="text-muted mb-3">Số 123 Đường Trung Tâm, Thành Phố</p>
          <button type="button" class="btn btn-outline-dark rounded-pill fw-bold w-100 py-2">Thay Đổi Địa Chỉ</button>
        </section>

        <section>
          <h2 class="h6 text-muted text-uppercase mb-3 border-bottom pb-2">Phương Thức Thanh Toán</h2>
          <form class="d-flex flex-column gap-3">
            <label class="p-3 border rounded d-flex align-items-center gap-3 bg-light" style="cursor:pointer;">
              <input type="radio" name="pay" checked class="form-check-input mt-0 fs-5" />
              <span class="fw-bold">Thẻ Tín Dụng / Ghi Nợ</span>
            </label>
            <label class="p-3 border rounded d-flex align-items-center gap-3 bg-light" style="cursor:pointer;">
              <input type="radio" name="pay" class="form-check-input mt-0 fs-5" />
              <span class="fw-bold">Ví Điện Tử</span>
            </label>
            <label class="p-3 border rounded d-flex align-items-center gap-3 bg-light" style="cursor:pointer;">
              <input type="radio" name="pay" class="form-check-input mt-0 fs-5" />
              <span class="fw-bold">Thanh Toán Khi Giao Hàng (COD)</span>
            </label>
          </form>
        </section>
      </div>

      <div>
        <section class="sticky-top" style="top: 100px;">
          <h2 class="h6 text-muted text-uppercase mb-4 border-bottom pb-2">Sản Phẩm Đã Chọn</h2>
          
          <article class="d-flex align-items-center gap-3 border">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200" alt="Giày Thể Thao Đỏ">
            <div class="flex-grow-1">
              <h3 class="h6 fw-bold mb-1">Giày Thể Thao Đỏ</h3>
              <p class="text-muted small mb-1">Số lượng: 1</p>
              <p class="mb-0 fw-bold" style="color: var(--color-primary);">2.500.000 ₫</p>
            </div>
          </article>
          
          <article class="d-flex align-items-center gap-3 border">
            <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=200" alt="Giày Trắng">
            <div class="flex-grow-1">
              <h3 class="h6 fw-bold mb-1">Puma RS-X Trắng</h3>
              <p class="text-muted small mb-1">Số lượng: 1</p>
              <p class="mb-0 fw-bold" style="color: var(--color-primary);">1.800.000 ₫</p>
            </div>
          </article>
        </section>
      </div>
    </main>
  </body>
</html>
