<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Trang Chủ Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="01-style.css" />
  </head>
  <body class="pb-5 mb-4">
    <header class="d-flex justify-content-between align-items-center p-3 p-md-4">
      <h1 class="h4 mb-0 fw-bold" style="color: var(--color-primary);">Cửa Hàng Sneaker</h1>
      <button type="button" class="btn btn-outline-dark rounded-pill fw-bold px-4">Tìm Kiếm</button>
    </header>

    <main class="container py-4">
      <section class="p-4 p-md-5 mb-5 rounded-4 text-white" style="background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));">
        <h2 class="display-6 fw-bold mb-2">Bộ Sưu Tập Mới</h2>
        <p class="lead mb-0 opacity-75">Săn ngay các mẫu giày thể thao cực chất cho mùa hè.</p>
      </section>

      <section>
        <h2 class="h4 mb-4 fw-bold">Sản Phẩm Nổi Bật</h2>
        
        <div class="product-grid">
          <article class="p-3 border">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80" alt="Giày Đỏ" class="product-img rounded-4 mb-3">
            <h3 class="h5 fw-bold">Nike Air Max Đỏ</h3>
            <p class="text-muted mb-4">Dòng thể thao năng động</p>
            <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold mt-auto py-2">Xem Chi Tiết</button>
          </article>
          
          <article class="p-3 border">
            <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?auto=format&fit=crop&w=600&q=80" alt="Giày Xanh" class="product-img rounded-4 mb-3">
            <h3 class="h5 fw-bold">Puma RS-X Trắng</h3>
            <p class="text-muted mb-4">Đế đệm khí êm ái</p>
            <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold mt-auto py-2">Xem Chi Tiết</button>
          </article>

          <article class="p-3 border">
            <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=600&q=80" alt="Giày Trượt Ván" class="product-img rounded-4 mb-3">
            <h3 class="h5 fw-bold">Vans Cổ Điển</h3>
            <p class="text-muted mb-4">Phong cách đường phố</p>
            <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold mt-auto py-2">Xem Chi Tiết</button>
          </article>
        </div>
      </section>
    </main>

    <nav class="d-flex justify-content-around p-3 p-md-4 shadow-lg">
      <a href="#" class="text-decoration-none fw-bold" style="color: var(--color-primary);">Trang Chủ</a>
      <a href="#" class="text-decoration-none text-muted fw-bold">Danh Mục</a>
      <a href="#" class="text-decoration-none text-muted fw-bold">Đã Lưu</a>
      <a href="#" class="text-decoration-none text-muted fw-bold">Hồ Sơ</a>
    </nav>
  </body>
</html>
