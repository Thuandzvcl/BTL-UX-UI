<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 03 - Phân Tích</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="03-style.css" />
  </head>
  <body>
    <header class="bg-white p-4 shadow-sm mb-4 d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0 fw-bold">Không Gian Phân Tích</h1>
      <button type="button" class="btn btn-dark rounded-pill fw-bold px-4">Xuất Dữ Liệu</button>
    </header>

    <main class="container py-2 analytics-grid">
      <aside class="bg-white p-4 rounded-4 shadow-sm border">
        <h2 class="h5 border-bottom pb-3 mb-4 fw-bold">Bộ Lọc</h2>
        <form>
          <label for="range" class="form-label fw-bold">Khoảng thời gian</label>
          <select id="range" class="form-select mb-4 py-2">
            <option>7 ngày qua</option>
            <option>30 ngày qua</option>
            <option>90 ngày qua</option>
          </select>

          <label for="channel" class="form-label fw-bold">Nguồn Khách</label>
          <select id="channel" class="form-select py-2">
            <option>Tất cả nguồn</option>
            <option>Từ Tự Nhiên</option>
            <option>Từ Quảng Cáo</option>
          </select>
        </form>
      </aside>

      <div class="analytics-content d-flex flex-column gap-4">
        <section class="row g-4">
          <div class="col-12 col-md-4">
            <article class="metric-card">
              <h3 class="h6 text-muted text-uppercase mb-2">Lượt Truy Cập</h3>
              <p class="fs-2 fw-bold mb-0 text-dark">42.100</p>
            </article>
          </div>
          <div class="col-12 col-md-4">
            <article class="metric-card" style="border-bottom: 4px solid var(--color-primary);">
              <h3 class="h6 text-muted text-uppercase mb-2">Tỷ Lệ Chuyển Đổi</h3>
              <p class="fs-2 fw-bold mb-0" style="color: var(--color-primary);">3.8%</p>
            </article>
          </div>
          <div class="col-12 col-md-4">
            <article class="metric-card">
              <h3 class="h6 text-muted text-uppercase mb-2">Tỷ Lệ Rời Bỏ</h3>
              <p class="fs-2 fw-bold mb-0 text-dark">28%</p>
            </article>
          </div>
        </section>

        <section class="bg-white p-4 rounded-4 shadow-sm border">
          <h2 class="h5 border-bottom pb-3 mb-4 fw-bold">Sản Phẩm Hàng Đầu</h2>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="py-3 border-0">Tên Sản Phẩm</th>
                  <th class="py-3 border-0">Lượt Xem</th>
                  <th class="py-3 border-0">Tỷ Lệ Mua</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="py-3 border-bottom-0 fw-bold">Giày Thể Thao Đỏ</td>
                  <td class="py-3 border-bottom-0 text-muted">18,400</td>
                  <td class="py-3 border-bottom-0 fw-bold" style="color: var(--color-primary);">4.2%</td>
                </tr>
                <tr>
                  <td class="py-3 border-bottom-0 fw-bold">Giày Trượt Ván Đen</td>
                  <td class="py-3 border-bottom-0 text-muted">8,120</td>
                  <td class="py-3 border-bottom-0 fw-bold" style="color: var(--color-primary);">6.1%</td>
                </tr>
                <tr>
                  <td class="py-3 border-bottom-0 fw-bold">Phụ Kiện Vệ Sinh Giày</td>
                  <td class="py-3 border-bottom-0 text-muted">5,900</td>
                  <td class="py-3 border-bottom-0 fw-bold" style="color: var(--color-primary);">1.9%</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
