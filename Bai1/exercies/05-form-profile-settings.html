<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 05 - Profile Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="05-style.css" />
  </head>
  <body>
    <header class="bg-white p-5 text-center shadow-sm mb-4">
      <h1 class="fw-bold mb-0">Cài Đặt Hồ Sơ</h1>
    </header>

    <main class="container py-2 mb-5">
      <form class="profile-form">
        
        <section>
          <h2 class="h5 border-bottom pb-3 mb-4 fw-bold">Tài Khoản Của Bạn</h2>
          <label for="fullName" class="form-label fw-bold">Họ và Tên</label>
          <input id="fullName" type="text" class="form-control mb-4" value="Khách Hàng Mới" />

          <label for="email" class="form-label fw-bold">Địa Chỉ Email</label>
          <input id="email" type="email" class="form-control mb-4" value="khachhang@example.com" />

          <label for="language" class="form-label fw-bold">Ngôn Ngữ</label>
          <select id="language" class="form-select">
            <option>Tiếng Việt</option>
            <option>English</option>
            <option>Japanese</option>
          </select>
        </section>

        <section>
          <h2 class="h5 border-bottom pb-3 mb-4 fw-bold">Tùy Chọn Thông Báo</h2>
          <label class="d-flex align-items-center gap-3 bg-light p-3 rounded border mb-3 fw-bold" style="cursor: pointer;">
            <input type="checkbox" checked class="form-check-input mt-0 fs-5" />
            Nhận thông báo ưu đãi qua Email
          </label>
          <label class="d-flex align-items-center gap-3 bg-light p-3 rounded border mb-4 fw-bold" style="cursor: pointer;">
            <input type="checkbox" class="form-check-input mt-0 fs-5" />
            Cập nhật trạng thái đơn hàng
          </label>

          <label for="theme" class="form-label fw-bold">Giao Diện Shop</label>
          <select id="theme" class="form-select">
            <option>Chủ Đề Sáng (Mặc định)</option>
            <option>Chủ Đề Tối (Ban đêm)</option>
            <option>Theo Hệ Thống</option>
          </select>
        </section>

        <section class="d-flex flex-column flex-md-row gap-3 bg-transparent border-0 shadow-none p-0">
          <h2 class="visually-hidden">Bảo Mật</h2>
          <button type="button" class="btn btn-dark rounded-pill py-3 fw-bold w-100">Đổi Mật Khẩu</button>
          <button type="button" class="btn btn-dark rounded-pill py-3 fw-bold w-100">Bật Xác Thực 2 Lớp</button>
        </section>

        <section class="d-flex flex-column flex-md-row gap-3 bg-transparent border-0 shadow-none p-0 align-items-center justify-content-end">
          <button type="submit" class="btn rounded-pill py-3 px-5 fw-bold w-100 text-white" style="background: linear-gradient(135deg, #FF4757, #FFA502); max-width: 300px;">Lưu Thay Đổi</button>
          <button type="button" class="btn btn-outline-dark rounded-pill py-3 px-5 fw-bold w-100" style="max-width: 300px;">Hủy Bỏ</button>
        </section>
        
      </form>
    </main>
  </body>
</html>
